# dockwright.tmux.conf — config for the dedicated `tmux -L dockwright` server
# that hosts the orchestrator's manager + worker sessions.
#
# Loaded via `tmux -L dockwright -f <this file>` at SERVER BIRTH (by TmuxDriver
# and bootstrap-recreate.sh). `-f` makes this the SOLE config for the
# dockwright server — ~/.tmux.conf is intentionally NOT inherited, so this file
# is the single source of truth. It is read once when the server starts; to apply
# edits to a running server:  tmux -L dockwright source-file <this file>
# (most options apply live; default-terminal needs a fresh server).
#
# Tune any block live, then persist the tweak back to
# deploy/tmux/dockwright.conf in the claude-orchestrator repo.

# ---- truecolor + kitty ------------------------------------------------------
set  -g  default-terminal "tmux-256color"          # -256color carries the right caps
set  -as terminal-features ",xterm-kitty:RGB"      # tell tmux the outer kitty term is 24-bit
set  -ga terminal-overrides ",xterm-256color:Tc"   # belt-and-suspenders for non-kitty TERMs

# ---- keyboard: Shift+Enter & modified keys (needs tmux >= 3.5) --------------
set  -s  extended-keys always                      # `always`, NOT `on`: Claude Code does not
                                                   # emit the activation seq under $TMUX, so `on`
                                                   # would still collapse Shift+Enter to Enter
set  -as terminal-features ",xterm*:extkeys"
# Do NOT set `extended-keys-format csi-u` on kitty — it breaks Shift+Enter (the
# kitty<->tmux negotiation drops the Shift modifier). Leave the format at its
# `xterm` default. (TmuxDriver also pins this to xterm before each inject.)

# ---- latency / focus / clipboard / passthrough / resize ---------------------
set  -sg escape-time 10            # default 500ms adds Esc-lag + splits escape seqs (not 0: misfires)
set  -g  focus-events on           # forward focus-in/out (Claude / vim redraw)
set  -g  set-clipboard on          # OSC-52 copy out to kitty
set  -g  allow-passthrough on      # Claude desktop notifications + progress bar reach kitty
setw -g  aggressive-resize on      # size to the smallest client VIEWING a window (mgr + workers)

# ---- prefix -----------------------------------------------------------------
# Default prefix C-b is kept. If prefix-capture bites (C-b reaches Claude's line
# editor instead of tmux under extended-keys), flip to C-a — the robust fallback —
# by uncommenting these three lines and re-sourcing:
# unbind C-b
# set  -g  prefix C-a
# bind C-a send-prefix

# ---- mouse + halved wheel scroll --------------------------------------------
set  -g  mouse on                  # click panes/windows, drag borders, wheel into copy-mode
# tmux has no scroll-speed option; wheel line-count is set by binding the wheel
# keys. -N 2 halves the default ~5-line jump. Bind in BOTH copy tables:
bind -T copy-mode    WheelUpPane   send -X -N 2 scroll-up
bind -T copy-mode    WheelDownPane send -X -N 2 scroll-down
bind -T copy-mode-vi WheelUpPane   send -X -N 2 scroll-up
bind -T copy-mode-vi WheelDownPane send -X -N 2 scroll-down
# Kill tmux's default wheel-over-status-bar window cycling. A trackpad emits a
# burst of wheel events per gesture, so one flick jumped through many windows at
# once; and with the custom status-format the bar's chip order (name-sorted,
# state-grouped) does NOT match window index order, so the cycle went somewhere
# other than what the bar showed. Use `prefix w` (below) / chip-click instead.
unbind -n WheelUpStatus
unbind -n WheelDownStatus

# ---- session switcher: prefix + j -> fzf popup ------------------------------
# Runs INSIDE the dockwright server, so the bare `tmux` calls already target the
# right socket. Requires fzf (brew install fzf). `prefix s` (choose-tree) is the
# always-available zero-install fallback.
bind j display-popup -E -w 60% -h 50% \
  "tmux list-sessions -F '#{session_name}' | \
   fzf --reverse --prompt 'session> ' --header 'attach session' | \
   xargs -r tmux switch-client -t"

# ---- worker/window switcher: prefix + w -> zoomed window tree ---------------
# Replaces wheel-over-status window cycling for jumping to a worker. Native
# choose-tree (NO external dependency, unlike the fzf popups above): a full-screen
# window list across all sessions — each row is the window_name (funny name +
# task, e.g. `cool-turtle · tkt-9871`). Type to filter, ↑/↓ or click to select,
# Enter jumps there. Works no matter how many workers overflow the status bar —
# the bar can only draw what fits the terminal width, this scrolls the full set.
# -Z zoom (full pane), -w start collapsed to WINDOWS (skip the session level).
bind w choose-tree -Zw

# ---- status line: 2-row, role-grouped, script-rendered, clickable -----------
# Two rows (set -g status 2):
#   row 0 = MANAGERS — every agent==manager session as 🎯 name, manager-pink
#   row 1 = WORKERS  — question/processing workers expanded by name (🔧 name),
#                      idle workers collapsed into a single 💤N chip
# Row content is produced by status_row.py (deployed beside this conf at
# ~/.claude/dockwright/status_row.py by setup.sh), which reads the
# orchestrator's active/*.json + questions/**/*.json and emits tmux-format
# chips with the per-state colors below. #() runs async on the status-interval:
# on first attach the row is briefly empty, then fills within an interval.
#
# The trailing #{pane_id} arg is load-bearing for the active-window highlight
# (the cool ▸ chip that marks the client's currently-viewed pane). tmux expands
# #{pane_id} per-client, so the script is told which pane THIS client views —
# authoritative and client-scoped. It fixes a lag on the chip-click path: a
# click routes through MouseDown1Status -> status_row.py click -> a run-shell
# `switch-client`, and a switch-client issued from inside a run-shell does NOT
# promptly re-run the #() highlight job, so the ▸ stuck on the previously-active
# window for up to status-interval. With the viewed pane baked into the #()
# command, switching to a different pane changes the command string, so tmux
# re-runs the job immediately -> the highlight moves the instant you click.
# (status_row.py falls back to querying the pane itself — `tmux display-message`
# with no -c — when the arg is absent; that fallback can't tell clients apart,
# so with >1 attached client it highlights the same pane on every bar. Passing
# #{pane_id} is what makes the highlight correct per-client.)
#
# The chips are the point of the 2-row bar: each manager/worker chip is
# clickable (it carries a #[range=user|switch:<pane>] payload) so a click jumps
# the client straight to that pane's window — cross-session too, e.g. from the
# manager bar into the claude-workers session. The collapsed 💤N idle group is
# clickable to expand/collapse the idle list. Click routing is the
# MouseDown1Status binding below: it hands the clicked range's payload to
# status_row.py's click resolver.
#
# Per-state colors mirror src/dockwright/hooks.py (keep in sync):
#     manager    #aa0066    worker idle  #444444
#     processing #aa8800    question     #aa3300    (fg #ffffff)
#
# NOTE: with custom status-format[N] the native window list is no longer drawn
# in the bar, so TmuxDriver.set_tab_color's window-status-* paints are inert
# HERE (they still color `prefix s` / choose-tree). status_row.py reproduces the
# state colors + 🔧 wrench, so neither is regressed.
set  -g  status 2
set  -g  status-interval 5
set  -g  status-style "bg=#1c1c1c,fg=#bbbbbb"
set  -g  'status-format[0]' "#[align=left] 🎯 MANAGERS #(python3 $HOME/.claude/dockwright/status_row.py managers #{pane_id})#[align=right] %H:%M "
set  -g  'status-format[1]' "#[align=left] 🔧 WORKERS  #(python3 $HOME/.claude/dockwright/status_row.py workers #{pane_id})"

# Clickable chips: status_row.py emits #[range=user|switch:<pane_id>] on each
# manager/worker chip and #[range=user|toggle:idle] on the collapsed idle group.
# MouseDown1Status routes the clicked range's #{mouse_status_range} payload to the
# click resolver. Bare `tmux` in the run-shell child targets this server via $TMUX
# (same mechanism as the #() renderers and `prefix j` above).
bind -n MouseDown1Status run-shell 'python3 $HOME/.claude/dockwright/status_row.py click "#{mouse_status_range}"'

# Legacy window-list styles — retained as the base for `prefix s` / choose-tree
# and as the documented stale-extension point; not drawn in the bar now that
# status-format[N] is set.
set  -g  window-status-format         " #I:#W "
set  -g  window-status-current-format " #I:#W "
set  -g  window-status-style          "bg=#303030,fg=#bbbbbb"
set  -g  window-status-current-style  "bg=#505050,fg=#ffffff"
