dispatch_keyed_adapter = '''**Task-keyed dispatches:** this deployment has no keyed-dispatch command wired in — dispatch keyed work through the non-keyed spec dispatch rule below, folding the task's context into the prompt: the task description or spec-doc path, an explicit instruction to run the full engineering chain (design → plan → implement with tests → review), and the worker_done contract — e.g. `<KEY> — <task summary + source link>. Run the full engineering chain (design → plan → implement with tests → review); call worker_done(claude_sid, summary) when done.` Operators typically bind a slash command carrying this contract via config. When your `dockwright.toml` binds a keyed-dispatch command, task-keyed dispatches become mechanical: spawn exactly that command with the key, no free-text task brief — the command encodes the workflow details free-text inevitably drops.'''
