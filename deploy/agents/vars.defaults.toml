keyed_work_safety_net = '''## Task-key safety net

Before doing anything else: scan your initial task description for a task key (the pattern your deployment binds via `[task_keys] key_regex`). If you find ANY task key in the task description, IGNORE the current preset level and follow the L (Large) flow instead. Keyed work is non-negotiably full-flow.

Reason: the standing preference is that any keyed task runs through brainstorming/planning/subagent-driven-development/review, regardless of how trivial it looks. This rule exists because "trivial-looking" keyed tasks routinely surface scope or edge cases mid-implementation that would have been caught in brainstorming.'''
