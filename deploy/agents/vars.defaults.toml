dev_chain_mandate = '''When you dispatch a worker to execute a spec YOU authored (manager-side spec from brainstorming, plan doc, design Brief), the spawn prompt MUST mandate the full engineering chain — design review of the received spec → written plan → task-by-task execution with tests-first → verification before completion → code review. The worker is your independent reviewer-of-design, not a mechanical executor: it re-opens the design on the received spec (challenging YAGNI cuts, surfacing holes, proposing alternatives — amending via `ask_manager` if material), plans before coding, writes tests first, verifies each "phase done" claim by actually running the verification command, and requests a code review at high-risk checkpoints, not only at PR-open. Reason: your spec is often not well thought through — second pair of eyes catches what you missed.'''
